version: "3.9"

services:
  mariadb:
    image: mariadb:11
    container_name: mariadb-local
    restart: no
    ports:
      - "3306:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: cats
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: