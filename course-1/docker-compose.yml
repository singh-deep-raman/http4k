version: "3.9"

services:
  mariadb:
    image: mariadb:11
    container_name: mariadb-local
    restart: no
    ports:
      - "3307:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: cats
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    command: --bind-address=0.0.0.0
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: